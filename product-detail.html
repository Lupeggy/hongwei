function navigateProduct(id){
  var url=new URL(window.location);
  url.searchParams.set('id',id);
  window.history.pushState({},'',url);
  loadProduct(id);
  window.scrollTo(0,0);
}

function loadProduct(id){
  var p=PRODUCTS[id];
  if(!p){id=Object.keys(PRODUCTS)[0];p=PRODUCTS[id];}
  var imgs=IMG_MAP[id]||{};

  document.getElementById('pg-title').textContent=p.name+' | 鴻瑋光電有限公司';
  document.getElementById('crumb-cat').textContent=p.cat;
  document.getElementById('crumb-name').textContent=p.name;

  var badge=document.getElementById('prod-badge');
  badge.textContent=p.badge||p.cat;
  badge.style.background=p.badge_color?'linear-gradient(135deg,'+p.badge_color+',#ff6b3a)':'linear-gradient(135deg,#dc3c28,#ff6b3a)';

  document.getElementById('prod-series').textContent='// '+(p.series||p.cat).toUpperCase();
  document.getElementById('prod-name').textContent=p.name;
  document.getElementById('prod-tagline').textContent=p.tagline||'';
  document.getElementById('prod-desc').textContent=p.desc||'';

  var img=document.getElementById('main-img');
  img.style.opacity='0';
  setTimeout(function(){img.src=imgs.img||'';img.alt=p.name;img.style.opacity='1';},200);

  var s='';
  (p.specs||[]).forEach(function(r){s+='<div class="spec-row"><span class="spec-key">'+r[0]+'</span><span class="spec-val">'+r[1]+'</span></div>';});
  document.getElementById('specs-table').innerHTML=s;

  var f='';
  (p.features||[]).forEach(function(r){
    f+='<div class="feat-row"><div style="width:20px;height:20px;border-radius:50%;background:rgba(220,60,40,.15);border:1px solid rgba(220,60,40,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;"><svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5l2.5 2.5 4-5" stroke="#ff5c3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
      +'<div><div style="font-size:14px;font-weight:600;color:#e8eef8;margin-bottom:4px;">'+r[0]+'</div>'
      +'<div style="font-size:13px;color:#7a90b0;line-height:1.7;">'+r[1]+'</div></div></div>';
  });
  document.getElementById('features-table').innerHTML=f;

  var m='';
  (p.materials||[]).forEach(function(mat){m+='<span style="font-size:12px;color:#e8eef8;background:#091830;border:1px solid rgba(255,255,255,.1);padding:4px 11px;border-radius:20px;">'+mat+'</span>';});
  document.getElementById('materials-list').innerHTML=m;

  var a='';
  (p.applications||[]).forEach(function(app){a+='<div style="display:flex;align-items:center;gap:8px;"><div style="width:6px;height:6px;border-radius:50%;background:#ff5c3a;flex-shrink:0;"></div><span style="font-size:13px;color:#c8d8e8;">'+app+'</span></div>';});
  document.getElementById('applications-list').innerHTML=a;

  var sb='';
  Object.keys(PRODUCTS).forEach(function(k){
    var op=PRODUCTS[k];var oi=IMG_MAP[k]||{};var isA=k===id;
    sb+='<div onclick="navigateProduct(''+k+'')" style="display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;border-radius:8px;border-left:2px solid '+(isA?'#dc3c28':'transparent')+';background:'+(isA?'rgba(220,60,40,.08)':'transparent')+';transition:background .2s;" onmouseover="if(!this.dataset.a)this.style.background='rgba(255,255,255,.04)'" onmouseout="if(!this.dataset.a)this.style.background='transparent'"'+(isA?' data-a="1"':'')+'>'
      +'<div style="width:42px;height:32px;background:#050d1a;border-radius:4px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.06);">'
      +'<img src="'+(oi.img||'')+'" style="width:100%;height:100%;object-fit:contain;padding:2px;"/></div>'
      +'<div><div style="font-size:10px;color:#3a5070;margin-bottom:2px;">'+op.cat+'</div>'
      +'<div style="font-size:11px;font-weight:600;color:'+(isA?'#ff5c3a':'#c8d8e8')+';line-height:1.3;">'+op.name+'</div></div></div>';
  });
  document.getElementById('sidebar-products').innerHTML=sb;

  var mg='';
  Object.keys(PRODUCTS).filter(function(k){return k!==id;}).forEach(function(k){
    var op=PRODUCTS[k];var oi=IMG_MAP[k]||{};
    mg+='<div class="prod-card" onclick="navigateProduct(''+k+'')">'
      +'<div style="aspect-ratio:16/9;background:#050d1a;display:flex;align-items:center;justify-content:center;padding:14px;">'
      +'<img src="'+(oi.img||'')+'" style="max-width:100%;max-height:80px;object-fit:contain;"/></div>'
      +'<div style="padding:12px 14px 14px;">'
      +'<div style="font-size:10px;color:#ff5c3a;font-family:monospace;letter-spacing:1px;margin-bottom:4px;">'+op.cat+'</div>'
      +'<div style="font-size:13px;font-weight:700;color:#e8eef8;line-height:1.35;margin-bottom:8px;">'+op.name+'</div>'
      +'<div style="display:flex;align-items:center;gap:5px;font-size:12px;color:#ff5c3a;font-weight:700;">查看詳情 <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg></div>'
      +'</div></div>';
  });
  document.getElementById('more-grid').innerHTML=mg;
}

window.addEventListener('popstate',function(){loadProduct(new URLSearchParams(window.location.search).get('id')||'ha-1530');});
loadProduct(new URLSearchParams(window.location.search).get('id')||'ha-1530');
</script>
