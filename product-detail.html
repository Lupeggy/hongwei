    f+='<div class="feat-row"><div style="width:20px;height:20px;border-radius:50%;background:rgba(220,60,40,.15);border:1px solid rgba(220,60,40,.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;"><svg width="9" height="9" viewBox="0 0 9 9" fill="none"><path d="M1.5 4.5l2.5 2.5 4-5" stroke="#ff5c3a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div><div style="font-size:14px;font-weight:600;color:#e8eef8;margin-bottom:4px;">'+r[0]+'</div><div style="font-size:13px;color:#7a90b0;line-height:1.7;">'+r[1]+'</div></div></div>';
  });
  document.getElementById('features-table').innerHTML=f;

  // Materials
  var m='';
  (p.materials||[]).forEach(function(mat){
    m+='<span style="font-size:12px;color:#e8eef8;background:#091830;border:1px solid rgba(255,255,255,.1);padding:4px 11px;border-radius:20px;">'+mat+'</span>';
  });
  document.getElementById('materials-list').innerHTML=m;

  // Applications
  var a='';
  (p.applications||[]).forEach(function(app){
    a+='<div style="display:flex;align-items:center;gap:8px;"><div style="width:6px;height:6px;border-radius:50%;background:#ff5c3a;flex-shrink:0;"></div><span style="font-size:13px;color:#c8d8e8;">'+app+'</span></div>';
  });
  document.getElementById('applications-list').innerHTML=a;

  // Sidebar
  var sb='';
  Object.keys(PRODUCTS).forEach(function(k){
    var op=PRODUCTS[k];var oi=IMG_MAP[k]||{};var isA=k===id;
    sb+='<div onclick="navigateProduct(''+k+'')" style="display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;border-radius:8px;border-left:2px solid '+(isA?'#dc3c28':'transparent')+';background:'+(isA?'rgba(220,60,40,.08)':'transparent')+';transition:background .2s;" onmouseover="this.style.background=''+(isA?'rgba(220,60,40,.08)':'rgba(255,255,255,.04)')+''" onmouseout="this.style.background=''+(isA?'rgba(220,60,40,.08)':'transparent')+''"><div style="width:42px;height:32px;background:#050d1a;border-radius:4px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.06);"><img src="'+(oi.img||'')+'" style="width:100%;height:100%;object-fit:contain;padding:2px;" alt="'+op.name+'"/></div><div><div style="font-size:10px;color:#3a5070;margin-bottom:2px;">'+op.cat+'</div><div style="font-size:11px;font-weight:600;color:'+(isA?'#ff5c3a':'#c8d8e8')+';line-height:1.3;">'+op.name.replace('鴻瑋光電','').trim()+'</div></div></div>';
  });
  document.getElementById('sidebar-products').innerHTML=sb;

  // More grid
  var mg='';
  Object.keys(PRODUCTS).filter(function(k){return k!==id;}).forEach(function(k){
    var op=PRODUCTS[k];var oi=IMG_MAP[k]||{};
    mg+='<div class="prod-card" onclick="navigateProduct(''+k+'')"><div style="aspect-ratio:16/9;background:#050d1a;display:flex;align-items:center;justify-content:center;padding:14px;"><img src="'+(oi.img||'')+'" style="max-width:100%;max-height:80px;object-fit:contain;" alt="'+op.name+'"/></div><div style="padding:12px 14px 14px;"><div style="font-size:10px;color:#ff5c3a;font-family:monospace;letter-spacing:1px;margin-bottom:4px;">'+op.cat+'</div><div style="font-size:13px;font-weight:700;color:#e8eef8;line-height:1.35;margin-bottom:8px;">'+op.name+'</div><div style="display:flex;align-items:center;gap:5px;font-size:12px;color:#ff5c3a;font-weight:700;">查看詳情 <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg></div></div></div>';
  });
  document.getElementById('more-grid').innerHTML=mg;
}
